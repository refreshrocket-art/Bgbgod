<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Idle NBA Mobile Sim</title>
<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#eee;
}

#nav {
  display:flex;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  background:#1a1a1a;
  padding:5px;
  z-index:10;
}

#nav button {
  flex:1 1 30%;
  margin:3px;
  padding:8px;
  font-size:12px;
}

.section {
  padding:10px;
}

.statBtn {
  padding:3px 6px;
  margin-left:5px;
}

.card {
  background:#1c1c1c;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

.badge {
  border:1px solid #555;
  padding:4px;
  margin:2px;
  display:inline-block;
}
</style>
</head>
<body>

<div id="nav">
<button onclick="setTab('career')">Career</button>
<button onclick="setTab('train')">Train</button>
<button onclick="setTab('season')">Season</button>
<button onclick="setTab('playoffs')">Playoffs</button>
<button onclick="setTab('fa')">FA</button>
<button onclick="setTab('stats')">Stats</button>
<button onclick="toggleGod()">God</button>
</div>

<div id="app"></div>

<script>

// ===== DATA =====
const TEAMS = Array.from({length:20},(_,i)=>"Team "+(i+1));

let game = {
tab:"career",
team:null,
age:18,
god:false,
tp:15,
season:1,
gameNum:0,
wins:0,
losses:0,
rings:0,
injury:0,
contract:{years:0,salary:0},
stats:{Speed:65,Three:65,Defense:65,Passing:65},
career:{pts:0,games:0},
badges:[],
awards:[],
league:[]
};

// ===== SAVE =====
function save(){localStorage.setItem("mobileNBA",JSON.stringify(game));}
function load(){let d=localStorage.getItem("mobileNBA"); if(d) game=JSON.parse(d);}
load();

// ===== CORE =====
function calcOVR(){
let v=Object.values(game.stats);
return Math.floor(v.reduce((a,b)=>a+b)/v.length);
}

function setTab(t){game.tab=t; render();}

// ===== LEAGUE =====
function createLeague(){
game.league = TEAMS.map(t=>({
name:t,
wins:0,
losses:0,
power:Math.random()*20+70
}));
}

// ===== START =====
function enterLeague(){
createLeague();
let t = game.league[Math.floor(Math.random()*game.league.length)];
game.team=t.name;
game.contract={years:2,salary:calcOVR()*100000};
}

// ===== TRAIN =====
function upgrade(stat){
if(game.tp>0||game.god){
if(game.stats[stat]<99){
game.stats[stat]++;
if(!game.god) game.tp--;
}
}
}

// ===== GAME =====
function playGame(){
if(game.injury>0){game.injury--; game.gameNum++; return;}

if(game.gameNum>=82){startPlayoffs(); return;}

let team = game.league.find(t=>t.name===game.team);
let opp = game.league[Math.floor(Math.random()*game.league.length)];

let boost = game.badges.includes("Sniper")?10:0;

let myScore = calcOVR()+boost+Math.random()*40;
let oppScore = opp.power+Math.random()*40;

if(myScore>oppScore){game.wins++; team.wins++;}
else {game.losses++; team.losses++;}

game.career.pts+=Math.floor(myScore/2);
game.career.games++;
game.tp+=1;
game.gameNum++;

if(Math.random()<0.05){game.injury=2;}

updateBadges();
simulateLeague();
}

// ===== SIM =====
function simulateLeague(){
game.league.forEach(t=>{
if(t.name!==game.team){
Math.random()>0.5?t.wins++:t.losses++;
}
});
}

// ===== PLAYOFFS =====
function startPlayoffs(){
let ranked=[...game.league].sort((a,b)=>b.wins-a.wins).slice(0,8);
let me=ranked.find(t=>t.name===game.team);

let log="";
if(!me){log="Missed Playoffs"; endSeason(); renderPlayoffs(log); return;}

for(let r=1;r<=3;r++){
let w=0,l=0;
while(w<4&&l<4){
Math.random()<calcOVR()/120?w++:l++;
}
log+=`R${r}: ${w}-${l}<br>`;
if(l===4){renderPlayoffs(log); endSeason(); return;}
}

game.rings++;
log+="🏆 Champion";
renderPlayoffs(log);
endSeason();
}

function renderPlayoffs(log){
document.getElementById("app").innerHTML=`<div class="card">${log}</div>`;
}

// ===== FA =====
function generateOffers(){
let offers = game.league.map(t=>({
team:t.name,
salary:Math.floor((t.power+Math.random()*20)*100000),
years:Math.floor(Math.random()*3)+1
}));

offers.sort((a,b)=>b.salary-a.salary);

return offers.slice(0,3);
}

function sign(o){
game.team=o.team;
game.contract={years:o.years,salary:o.salary};
}

// ===== END =====
function endSeason(){
game.age++;
game.season++;
game.gameNum=0;
game.wins=0;
game.losses=0;
game.contract.years--;

if(game.contract.years<=0){
game.offers=generateOffers();
game.tab="fa";
}
createLeague();
}

// ===== BADGES =====
function updateBadges(){
if(game.stats.Three>90 && !game.badges.includes("Sniper")){
game.badges.push("Sniper");
}
if(calcOVR()>85 && !game.badges.includes("Star")){
game.badges.push("Star");
}
}

// ===== GOD =====
function toggleGod(){
game.god=!game.god;
alert("God Mode: "+(game.god?"ON":"OFF"));
}

// ===== UI =====
function render(){
let html="";

if(game.tab==="career"){
html+=`
<div class="card">
<button onclick="enterLeague()">Enter NBA</button>
<p>Team: ${game.team||"None"}</p>
<p>Age: ${game.age}</p>
<p>Contract: ${game.contract.years}y | $${game.contract.salary}</p>
</div>`;
}

if(game.tab==="train"){
html+=`<div class="card">TP: ${game.tp}</div>`;
Object.keys(game.stats).forEach(s=>{
html+=`<div class="card">${s}: ${game.stats[s]}
<button class="statBtn" onclick="upgrade('${s}')">+</button></div>`;
});
}

if(game.tab==="season"){
html+=`
<div class="card">
Season ${game.season} | ${game.wins}-${game.losses}<br>
Game ${game.gameNum}/82 | Injury: ${game.injury}
</div>
<button onclick="playGame()">Play</button>
<button onclick="simSeason()">Sim</button>
`;

html+=`<div class="card">Standings:<br>`;
[...game.league].sort((a,b)=>b.wins-a.wins).slice(0,5)
.forEach(t=>{html+=`${t.name} ${t.wins}-${t.losses}<br>`});
html+=`</div>`;
}

if(game.tab==="fa"){
html+=`<div class="card">Offers:<br>`;
(game.offers||[]).forEach(o=>{
html+=`${o.team} $${o.salary} (${o.years}y)
<button onclick='sign(${JSON.stringify(o)})'>Sign</button><br>`;
});
html+=`</div>`;
}

if(game.tab==="stats"){
let g=game.career.games||1;
html+=`
<div class="card">
OVR: ${calcOVR()}<br>
PPG: ${(game.career.pts/g).toFixed(1)}<br>
Rings: ${game.rings}
</div>`;

html+=`<div class="card">Badges:<br>`;
game.badges.forEach(b=>html+=`<span class="badge">${b}</span>`);
html+=`</div>`;
}

document.getElementById("app").innerHTML=html;
save();
}

// ===== SIM SEASON =====
function simSeason(){
while(game.gameNum<82) playGame();
render();
}

render();

</script>
</body>
</html>
